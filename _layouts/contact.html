---
layout: default
title: Contact
permalink: /contact/
subtitle: Get In Touch
---
<div class="py-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center max-w-3xl mx-auto mb-16">
        <h2 class="text-picto-primary font-semibold text-xl mb-2">{{ page.subtitle }}</h2>
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">{{ page.headline }}</h1>
        <div class="text-lg text-gray-300">
            {{ content }}
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-12 max-w-5xl mx-auto">
        <div class="lg:w-1/3 space-y-8">
            <div class="flex items-start gap-4">
                <div class="w-12 h-12 bg-[#a94107]/20 rounded-full flex items-center justify-center text-picto-primary shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <h3 class="text-xl font-bold mb-1 text-white">Email</h3>
                    <p class="text-gray-400">{{ page.email }}</p>
                </div>
            </div>
            <div class="flex items-start gap-4">
                <div class="w-12 h-12 bg-[#a94107]/20 rounded-full flex items-center justify-center text-picto-primary shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <div>
                    <h3 class="text-xl font-bold mb-1 text-white">Location</h3>
                    <p class="text-gray-400">{{ page.location }}</p>
                </div>
            </div>
        </div>

        <div class="lg:w-2/3 bg-gray-800 p-8 rounded-3xl shadow-lg border border-gray-700">
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium text-gray-300">Name</span></label>
                        <input type="text" placeholder="John Doe" class="input input-bordered w-full bg-gray-900 border-gray-700 text-white" />
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium text-gray-300">Email</span></label>
                        <input type="email" placeholder="john@example.com" class="input input-bordered w-full bg-gray-900 border-gray-700 text-white" />
                    </div>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium text-gray-300">Subject</span></label>
                    <input type="text" placeholder="Project Inquiry" class="input input-bordered w-full bg-gray-900 border-gray-700 text-white" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium text-gray-300">Message</span></label>
                    <textarea class="textarea textarea-bordered h-32 bg-gray-900 border-gray-700 text-white" placeholder="Tell me about your project..."></textarea>
                </div>
                <button type="button" class="btn bg-picto-primary text-white hover:bg-picto-primary-dark border-none w-full md:w-auto px-10">Send Message</button>
            </form>
        </div>
    </div>
</div>
