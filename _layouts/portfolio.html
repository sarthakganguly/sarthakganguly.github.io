---
layout: default
---
<div class="py-20 bg-gray-900 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center max-w-3xl mx-auto mb-16">
            <h2 class="text-picto-primary font-semibold text-xl mb-2">{{ page.subtitle }}</h2>
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-6">{{ page.headline }}</h1>
            <div class="text-lg text-gray-300">
                {{ content }}
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            {% for project in page.projects %}
            <div class="bg-gray-800 rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all group border border-gray-700">
                <div class="overflow-hidden h-64">
                    <img src="{{ project.image }}" alt="{{ project.title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                </div>
                <div class="p-8">
                    <span class="text-sm font-semibold text-picto-primary uppercase tracking-wider">{{ project.category }}</span>
                    <h3 class="text-2xl font-bold mt-2 mb-3 text-white">{{ project.title }}</h3>
                    <p class="text-gray-400 mb-6">{{ project.description }}</p>
                    <a href="{{ project.link }}" class="text-picto-primary font-medium hover:text-picto-primary-dark flex items-center gap-2">
                        View Project
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
